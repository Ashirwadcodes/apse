services:
  - type: web
    name: apctt-gateway-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: KOREA_NTB_API_KEY
        sync: false
      - key: KOREA_NTB_BASE_URL
        value: https://apis.data.go.kr/B552536/tech_4/techall
      - key: KOREA_NTB_TTL_SECONDS
        value: 86400
      - key: CACHE_TTL_SECONDS
        value: 86400
